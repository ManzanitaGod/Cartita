<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carta mágica</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Georgia, serif;
      background:
        radial-gradient(circle at top, rgba(255, 216, 120, 0.15), transparent 22%),
        radial-gradient(circle at 15% 25%, rgba(255,255,255,0.07), transparent 18%),
        radial-gradient(circle at 85% 18%, rgba(255,255,255,0.07), transparent 18%),
        linear-gradient(180deg, #0c0a18 0%, #1c1430 45%, #2d1d47 100%);
    }

    .sparkles span {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255, 233, 170, 0.95);
      box-shadow: 0 0 12px rgba(255, 223, 120, 0.8);
      animation: twinkle linear infinite;
    }

    .sparkles span:nth-child(1) { top: 8%; left: 8%; animation-duration: 4s; }
    .sparkles span:nth-child(2) { top: 16%; left: 18%; animation-duration: 5s; }
    .sparkles span:nth-child(3) { top: 10%; left: 32%; animation-duration: 4.6s; }
    .sparkles span:nth-child(4) { top: 20%; left: 52%; animation-duration: 6s; }
    .sparkles span:nth-child(5) { top: 12%; left: 74%; animation-duration: 5.1s; }
    .sparkles span:nth-child(6) { top: 24%; left: 90%; animation-duration: 4.8s; }
    .sparkles span:nth-child(7) { top: 48%; left: 10%; animation-duration: 5.6s; }
    .sparkles span:nth-child(8) { top: 60%; left: 28%; animation-duration: 4.5s; }
    .sparkles span:nth-child(9) { top: 68%; left: 52%; animation-duration: 5.8s; }
    .sparkles span:nth-child(10) { top: 76%; left: 82%; animation-duration: 4.4s; }

    @keyframes twinkle {
      0%, 100% { transform: scale(0.7); opacity: 0.35; }
      50% { transform: scale(1.35); opacity: 1; }
    }

    .scene {
      position: relative;
      width: 1280px;
      max-width: 96vw;
      height: 760px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      padding: 20px 30px;
    }

    #openLetter {
      display: none;
    }

    .left-visual {
      position: relative;
      width: 420px;
      height: 680px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .character-glow {
      position: absolute;
      width: 360px;
      height: 520px;
      bottom: 50px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,214,122,0.18), transparent 68%);
      filter: blur(18px);
    }

    .character-img {
      position: relative;
      max-height: 660px;
      max-width: 100%;
      object-fit: contain;
      filter:
        drop-shadow(0 0 18px rgba(255, 218, 120, 0.20))
        drop-shadow(0 18px 28px rgba(0, 0, 0, 0.45));
      animation: floatImage 4.5s ease-in-out infinite;
      user-select: none;
      pointer-events: none;
    }

    @keyframes floatImage {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    .letter-zone {
      position: relative;
      width: 520px;
      height: 640px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .wrap {
      position: relative;
      width: 460px;
      height: 590px;
      cursor: pointer;
      perspective: 1200px;
    }

    .top-text {
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      color: #f3ddb2;
      font-size: 18px;
      letter-spacing: 3px;
      text-shadow: 0 0 10px rgba(255, 214, 120, 0.25);
      white-space: nowrap;
    }

    .letter {
      position: absolute;
      left: 50%;
      top: 110px;
      width: 400px;
      height: 500px;
      transform: translateX(-50%) translateY(120px) scale(0.9);
      opacity: 0;
      z-index: 2;
      transition: transform 1.15s ease, opacity 0.9s ease;
    }

    .paper {
      position: absolute;
      inset: 0;
      padding: 40px 34px;
      background:
        linear-gradient(180deg, rgba(255,248,224,0.98), rgba(243,229,190,0.98)),
        repeating-linear-gradient(
          180deg,
          rgba(120,88,37,0.045) 0px,
          rgba(120,88,37,0.045) 1px,
          transparent 1px,
          transparent 30px
        );
      border: 2px solid #b79255;
      border-radius: 10px;
      color: #4d371f;
      box-shadow:
        0 22px 54px rgba(0,0,0,0.36),
        inset 0 0 14px rgba(255,255,255,0.2);
      overflow: hidden;
    }

    .paper::before {
      content: "";
      position: absolute;
      top: 18px;
      left: 24px;
      right: 24px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(133,93,42,0.38), transparent);
    }

    .paper::after {
      content: "⚡";
      position: absolute;
      top: 16px;
      right: 22px;
      font-size: 26px;
      color: rgba(138, 86, 20, 0.8);
      text-shadow: 0 0 8px rgba(255, 214, 100, 0.28);
    }

    .divider {
      width: 100%;
      height: 2px;
      margin: 18px 0 24px;
      background: linear-gradient(90deg, transparent, #a67938, transparent);
    }

    .message {
      font-size: 20px;
      line-height: 1.8;
      text-align: justify;
      color: #4d371f;
      margin-top: 18px;
    }

    .signature {
      margin-top: 24px;
      text-align: right;
      font-size: 22px;
      color: #7b1f25;
      font-style: italic;
    }

    .envelope {
      position: absolute;
      left: 50%;
      top: 270px;
      width: 460px;
      height: 290px;
      transform: translateX(-50%);
      z-index: 5;
      transition: opacity 0.7s ease, transform 0.8s ease;
    }

    .envelope-base {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, #d7b167 0%, #c5974d 100%);
      border: 2px solid #a37739;
      border-radius: 10px;
      box-shadow:
        0 18px 35px rgba(0,0,0,0.34),
        inset 0 0 0 1px rgba(255,236,180,0.18);
    }

    .envelope-front {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.08), transparent 40%),
        linear-gradient(180deg, #d0a760 0%, #bd9047 100%);
      clip-path: polygon(0 100%, 0 45%, 50% 74%, 100% 45%, 100% 100%);
      border-bottom-left-radius: 10px;
      border-bottom-right-radius: 10px;
      z-index: 2;
    }

    .seal {
      position: absolute;
      left: 50%;
      top: 57%;
      transform: translate(-50%, -50%);
      width: 74px;
      height: 74px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #c81f2d, #881019 76%);
      border: 4px solid #efc56c;
      z-index: 7;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #f8e7b2;
      font-size: 30px;
      box-shadow:
        0 0 18px rgba(199, 29, 42, 0.45),
        inset 0 0 10px rgba(255,255,255,0.12);
      transition: opacity 0.5s ease, transform 0.7s ease;
    }

    .flap {
      position: absolute;
      top: 0;
      left: 0;
      width: 0;
      height: 0;
      border-left: 230px solid transparent;
      border-right: 230px solid transparent;
      border-top: 145px solid #e3be7b;
      transform-origin: top center;
      z-index: 6;
      filter: drop-shadow(0 3px 4px rgba(0,0,0,0.15));
      transition: transform 1s ease, opacity 0.55s ease;
    }

    .hint {
      position: absolute;
      bottom: -16px;
      width: 100%;
      text-align: center;
      color: #f3ddb2;
      font-size: 18px;
      letter-spacing: 1px;
    }

    .hint::after {
      content: "Haz clic para abrir la carta";
    }

    .magic-smoke span {
      position: absolute;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,228,170,0.12), transparent 70%);
      filter: blur(14px);
      animation: mist 6.5s ease-in-out infinite;
      pointer-events: none;
    }

    .magic-smoke span:nth-child(1) { left: 60px; top: 80px; animation-delay: 0s; }
    .magic-smoke span:nth-child(2) { right: 60px; top: 120px; animation-delay: 1.5s; }
    .magic-smoke span:nth-child(3) { left: 120px; bottom: 60px; animation-delay: 3s; }

    @keyframes mist {
      0%, 100% { transform: translateY(0) scale(0.85); opacity: 0.15; }
      50% { transform: translateY(-30px) scale(1.08); opacity: 0.32; }
    }

    #openLetter:checked + label .letter {
      transform: translateX(-50%) translateY(0px) scale(1);
      opacity: 1;
    }

    #openLetter:checked + label .envelope {
      opacity: 0;
      transform: translateX(-50%) translateY(40px) scale(0.9);
      pointer-events: none;
    }

    #openLetter:checked + label .flap {
      transform: rotateX(180deg);
      opacity: 0;
    }

    #openLetter:checked + label .seal {
      transform: translate(-50%, -50%) scale(0.65);
      opacity: 0;
    }

    #openLetter:checked + label .hint::after {
      content: "Haz clic para cerrar la carta";
    }

    @media (max-width: 1100px) {
      .scene {
        width: 100%;
        height: auto;
        min-height: 100vh;
        flex-direction: column;
        gap: 10px;
        padding: 30px 10px 40px;
      }

      .left-visual {
        width: 280px;
        height: 360px;
      }

      .character-img {
        max-height: 340px;
      }

      .letter-zone {
        width: 100%;
        height: 660px;
      }

      .wrap {
        transform: scale(0.92);
      }
    }

    @media (max-width: 600px) {
      .wrap {
        transform: scale(0.78);
      }

      .top-text {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="sparkles">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="scene">
    <div class="left-visual">
      <div class="character-glow"></div>
      <img src="harry.png" alt="Imagen decorativa" class="character-img">
    </div>

    <div class="letter-zone">
      <input type="checkbox" id="openLetter">

      <label for="openLetter" class="wrap">
        <div class="top-text">CARTA MÁGICA</div>

        <div class="magic-smoke">
          <span></span>
          <span></span>
          <span></span>
        </div>

        <div class="letter">
          <div class="paper">
            <div class="divider"></div>

            <div class="message">
              ola, amor:
              <br><br>
              Sé que estamos pasando por varios problemas. Algunos no los hemos solucionado, o lo intentamos y llegan más temas que hacen que todo se nos complique aún más. Pero yo sé que vamos a lograr superarlo, porque todavía tengo fe.
              <br><br>
              Mejor dicho, no solo tengo fe: sé que nuestra relación va a durar mucho. No la veo como una simple etapa del colegio. Te soy sincero, a pesar de todos los problemas, quiero seguir contigo.
            </div>

            <div class="signature">Con todo mi amor ⚡</div>
          </div>
        </div>

        <div class="envelope">
          <div class="envelope-base"></div>
          <div class="envelope-front"></div>
          <div class="flap"></div>
          <div class="seal">⚡</div>
        </div>

        <div class="hint"></div>
      </label>
    </div>
  </div>
</body>
</html>
